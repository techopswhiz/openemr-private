# Golden set: patient_appointments tool
tool: patient_appointments

cases:
  - id: appointments_returns_structure
    description: Valid patient returns expected response shape
    args:
      patient_uuid: "__FIRST_PATIENT_UUID__"
    must_contain_keys: [appointments, patient_uuid]
    field_types:
      appointments: list
      patient_uuid: str
    result_list_field: appointments
    item_must_contain_keys: [pc_eventDate, pc_startTime]
    must_not_error: true

  - id: appointments_invalid_uuid
    description: Invalid UUID returns empty list, no crash
    args:
      patient_uuid: "00000000-0000-0000-0000-000000000000"
    must_contain_keys: [appointments, patient_uuid]
    field_types:
      appointments: list
    must_not_error: true

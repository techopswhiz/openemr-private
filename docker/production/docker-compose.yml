# Use admin/pass as user/password credentials to login to openemr (from OE_USER and OE_PASS below)
# MYSQL_HOST and MYSQL_ROOT_PASS are required for openemr
# MYSQL_USER, MYSQL_PASS, OE_USER, OE_PASS are optional for openemr and
#   if not provided, then default to openemr, openemr, admin, and pass respectively.
#
# Agent setup (after first boot):
#   1. Log in to OpenEMR at http://localhost (admin/pass)
#   2. Go to Admin > System > API Clients to register an OAuth2 client
#   3. Copy client_id and client_secret into your .env file
#   4. Run: docker compose restart agent
services:
  mysql:
    restart: always
    image: mariadb:11.8
    command: ['mariadbd','--character-set-server=utf8mb4']
    volumes:
    - databasevolume:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test:
      - CMD
      - /usr/local/bin/healthcheck.sh
      - --su-mysql
      - --connect
      - --innodb_initialized
      start_period: 1m
      start_interval: 10s
      interval: 1m
      timeout: 5s
      retries: 3
  nginx:
    restart: always
    image: nginx:alpine
    ports:
    - 80:80
    - 443:443
    volumes:
    - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    - certbot-webroot:/var/www/certbot:ro
    - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      openemr:
        condition: service_healthy
  certbot:
    image: certbot/certbot
    volumes:
    - certbot-webroot:/var/www/certbot
    - certbot-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
  openemr:
    restart: always
    image: openemr/openemr:7.0.4
    expose:
    - "80"
    - "443"
    volumes:
    - logvolume01:/var/log
    - sitevolume:/var/www/localhost/htdocs/openemr/sites
    environment:
      MYSQL_HOST: mysql
      MYSQL_ROOT_PASS: root
      MYSQL_USER: openemr
      MYSQL_PASS: openemr
      OE_USER: admin
      OE_PASS: pass
      OPENEMR_SETTING_rest_api: 1
      OPENEMR_SETTING_rest_fhir_api: 1
      OPENEMR_SETTING_oauth_password_grant: 3
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - /usr/bin/curl
      - --fail
      - --insecure
      - --show-error
      - --silent
      - -o
      - /dev/null
      - https://localhost/
      start_period: 3m
      start_interval: 10s
      interval: 1m
      timeout: 5s
      retries: 3
  agent:
    restart: always
    build:
      context: ../../agent
      dockerfile: Dockerfile
    expose:
    - "8080"
    environment:
      ROOT_PATH: /agent
      OPENEMR_BASE_URL: http://openemr
      OPENEMR_CLIENT_ID: ${OPENEMR_CLIENT_ID:-}
      OPENEMR_CLIENT_SECRET: ${OPENEMR_CLIENT_SECRET:-}
      OPENEMR_USERNAME: ${OPENEMR_USERNAME:-admin}
      OPENEMR_PASSWORD: ${OPENEMR_PASSWORD:-pass}
      XAI_API_KEY: ${XAI_API_KEY:-}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_TRACING_V2: "true"
      LANGCHAIN_PROJECT: openemr-agent
    depends_on:
      openemr:
        condition: service_healthy
volumes:
  logvolume01: {}
  sitevolume: {}
  databasevolume: {}
  certbot-webroot: {}
  certbot-certs: {}

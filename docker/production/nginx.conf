server {
    listen 80;
    server_name openemr.g4.techopswhiz.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name openemr.g4.techopswhiz.com;

    ssl_certificate /etc/letsencrypt/live/openemr.g4.techopswhiz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/openemr.g4.techopswhiz.com/privkey.pem;

    # Agent UI at /agent/
    location /agent/ {
        proxy_pass http://agent:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else goes to OpenEMR
    location / {
        proxy_pass https://openemr;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
